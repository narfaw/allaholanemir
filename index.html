
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tanrının Oyuncağı</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1419 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .text-container {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .floating-text {
            position: absolute;
            font-size: 2.5rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5),
                         0 0 40px rgba(100, 200, 255, 0.3);
            filter: drop-shadow(0 0 10px rgba(100, 200, 255, 0.5));
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-30px) scale(1.1);
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        .particle {
            position: absolute;
            pointer-events: none;
        }

        .particle-dot {
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #64c8ff, #0099ff);
            border-radius: 50%;
            box-shadow: 0 0 10px #64c8ff;
            animation: particleFloat 2s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-container" id="textContainer"></div>
        <div id="particles"></div>
    </div>

    <script>
        const randomTexts = [
            "✨ Sihir",
            "🌌 Evren",
            "💫 Hayal",
            "🎭 Oyuncu",
            "🔮 Kahve",
            "🌙 Gece",
            "⭐ Yıldız",
            "🎨 Renk",
            "🎵 Müzik",
            "💎 Değer",
            "🌊 Dalga",
            "🔥 Ateş",
            "❄️ Kar",
            "🌪️ Fırtına",
            "✨ Işık",
            "🎪 Sirk",
            "🎭 Tiyatro",
            "🎬 Sinema",
            "📚 Kitap",
            "🎸 Gitar"
        ];

        const colors = ['#ff006e', '#00d9ff', '#ffbe0b', '#8338ec', '#3a86ff', '#fb5607', '#05ffa1'];

        const textContainer = document.getElementById('textContainer');
        const particlesContainer = document.getElementById('particles');

        function getRandomText() {
            return randomTexts[Math.floor(Math.random() * randomTexts.length)];
        }

        function getRandomColor() {
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function getRandomPosition() {
            return {
                x: Math.random() * (window.innerWidth - 150),
                y: Math.random() * (window.innerHeight - 150)
            };
        }

        function spawnRandomText() {
            const text = getRandomText();
            const color = getRandomColor();
            const position = getRandomPosition();

            const element = document.createElement('div');
            element.className = 'floating-text';
            element.textContent = text;
            element.style.left = position.x + 'px';
            element.style.top = position.y + 'px';
            element.style.color = color;
            element.style.animationDuration = (2 + Math.random() * 2) + 's';

            element.addEventListener('click', (e) => {
                e.stopPropagation();
                const rect = element.getBoundingClientRect();
                const x = rect.left + rect.width / 2;
                const y = rect.top + rect.height / 2;
                createParticles(x, y, color);
            });

            textContainer.appendChild(element);

            setTimeout(() => {
                element.style.animation = 'fadeOut 1s ease-out forwards';
                setTimeout(() => element.remove(), 1000);
            }, 4000 + Math.random() * 3000);
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = '<div class="particle-dot"></div>';

                const angle = (Math.PI * 2 * i) / 12;
                const velocity = 3 + Math.random() * 5;
                const tx = Math.cos(angle) * velocity * 50;
                const ty = Math.sin(angle) * velocity * 50;

                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', tx + 'px');
                particle.style.setProperty('--ty', ty + 'px');
                particle.querySelector('.particle-dot').style.background = color;

                particlesContainer.appendChild(particle);

                setTimeout(() => particle.remove(), 2000);
            }
        }

        // İlk yazıları oluştur
        for (let i = 0; i < 8; i++) {
            setTimeout(() => spawnRandomText(), i * 300);
        }

        // Her saniye yeni yazı oluştur
        setInterval(spawnRandomText, 1200);

        // Tablet dokunmatik desteği
        textContainer.addEventListener('touchstart', (e) => {
            if (e.target.classList.contains('floating-text')) {
                e.preventDefault();
                e.target.click();
            }
        });
    </script>
</body>
</html>
