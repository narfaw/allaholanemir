    <script>
        // ========== SES EFEKTLERİ ==========
        class SoundEffects {
            constructor() {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            playExplosion() {
                const now = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
                
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0, now + 0.3);
                
                osc.start(now);
                osc.stop(now + 0.3);
            }

            playRocket() {
                const now = this.audioContext.currentTime;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(this.audioContext.destination);
                
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0, now + 0.2);
                
                osc.start(now);
                osc.stop(now + 0.2);
            }

            playWin() {
                const now = this.audioContext.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = this.audioContext.createOscillator();
                    const gain = this.audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(this.audioContext.destination);
                    
                    osc.frequency.value = 400 + (i * 150);
                    gain.gain.setValueAtTime(0.3, now + i * 0.1);
                    gain.gain.exponentialRampToValueAtTime(0, now + i * 0.1 + 0.3);
                    
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.3);
                }
            }
        }

        const sound = new SoundEffects();

        // ========== HABERLER GENERATOR ==========
        const allahNews = [
            { title: "Allah Orduları Doğu Kalesini İşgal Etti! 🔥", desc: "200.000 asker ile yapılan operasyonla Doğu Kalesi tamamen kontrol altına alındı." },
            { title: "Tanrısal Işın Silahı Aktif! ⚡", desc: "Gücü %95'e ulaştı. Emir'in merkezine doğru hedefleniliyor." },
            { title: "Emir'in Başkenti Kuşatma Altında! 🏰", desc: "100km mesafede bulunan Allah Orduları Başkenti işgale hazırlanıyor." },
            { title: "500.000 Asker Harekete Geçti! 💂", desc: "Tüm gücüyle son büyük saldırı için konuşlanıyor." },
            { title: "Nötr Bölge İşgal Altında! 📍", desc: "Stratejik konumundan dolayı Nötr Bölge işgal edildi." },
            { title: "Allah'ın Zaferi Yakın! 🎯", desc: "Askeri analistler 24 saat içinde Emir'in yenileceğini öngörüyor." }
        ];

        const emirNews = [
            { title: "Emir Karşı Taarruz Hazırlığında! 🛡️", desc: "Gizli silahları devreye alarak Allah'a karşı hamlesi planlanıyor." },
            { title: "Emir'in Gücü Arttı! 💪", desc: "Yeni teknoloji ile silahlı 300.000 asker sefere çıkıyor." },
            { title: "Müttefikler Desteğe Geliyor! 🤝", desc: "3 ülke askeri destek veriyor. Allah'ın yenilmez değildir!" },
            { title: "Başkent Savunmasında Hazır! 🏯", desc: "20 kat kalın duvarlar ve anti-hava sistemi devreye alındı." },
            { title: "Emir'in Usta Planı! 🎲", desc: "Allah'ın stratejisini kıracak gizli hamle hazırlandı." },
            { title: "Zafer Bizimdir! 🎖️", desc: "Emir, tarihinin en büyük dönüşümünü yaşanacağını duyurdu." }
        ];

        // ========== HARITA ==========
        class WarMap {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.allahPos = { x: 150, y: 200 };
                this.emirPos = { x: this.canvas.width - 150, y: 200 };
                this.centerPos = { x: this.canvas.width / 2, y: 200 };
                this.projectiles = [];
                this.explosions = [];
                this.allahPower = 75;
                this.emirPower = 68;
                this.animate();
            }

            fireProjectile(from, to, color) {
                this.projectiles.push({
                    x: from.x,
                    y: from.y,
                    targetX: to.x,
                    targetY: to.y,
                    color: color,
                    progress: 0,
                    speed: 0.05
                });
                sound.playRocket();
            }

            addExplosion(x, y, color) {
                this.explosions.push({
                    x: x,
                    y: y,
                    radius: 10,
                    maxRadius: 80,
                    life: 20,
                    color: color
                });
                sound.playExplosion();
            }

            drawArmy(x, y, color, name) {
                // Ordu dairesi
                this.ctx.fillStyle = color;
                this.ctx.shadowColor = color;
                this.ctx.shadowBlur = 25;
                this.ctx.beginPath();
                this.ctx.arc(x, y, 35, 0, Math.PI * 2);
                this.ctx.fill();

                // Parlayan halka
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.arc(x, y, 50, 0, Math.PI * 2);
                this.ctx.stroke();

                // İsim
                this.ctx.shadowBlur = 0;
                this.ctx.fillStyle = '#ffffff';
                this.ctx.font = 'bold 14px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(name, x, y + 75);

                // Yıldız şekli
                this.drawStar(x, y, 5, 25, 12, color);
            }

            drawStar(x, y, points, outerRadius, innerRadius, color) {
                let step = Math.PI / points;
                this.ctx.fillStyle = color;
                this.ctx.beginPath();
                this.ctx.moveTo(x, y - outerRadius);

                for (let i = 1; i < points * 2; i++) {
                    let radius = i % 2 === 0 ? outerRadius : innerRadius;
                    let angle = i * step - Math.PI / 2;
                    this.ctx.lineTo(
                        x + Math.cos(angle) * radius,
                        y + Math.sin(angle) * radius
                    );
                }
                this.ctx.closePath();
                this.ctx.fill();
            }

            drawTerritory(x, y, width, height, color, label) {
                this.ctx.fillStyle = color;
                this.ctx.globalAlpha = 0.2;
                this.ctx.fillRect(x, y, width, height);
                this.ctx.globalAlpha = 1;

                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = 3;
                this.ctx.strokeRect(x, y, width, height);

                this.ctx.fillStyle = color;
                this.ctx.font = 'bold 16px Arial';
                this.ctx.textAlign = 'center';
                this.ctx.fillText(label, x + width / 2, y + height / 2);
            }

            animate() {
                // Temizle
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Topraklar
                this.drawTerritory(50, 100, 150, 200, '#ff3333', 'ALLAH TOPRAKLARI');
                this.drawTerritory(this.canvas.width - 200, 100, 150, 200, '#3366ff', 'EMİR TOPRAKLARI');
                this.drawTerritory(
                    this.canvas.width / 2 - 75,
                    320,
                    150,
                    80,
                    '#ffaa00',
                    'NÖTR BÖLGE'
                );

                // Ordular
                this.drawArmy(this.allahPos.x, this.allahPos.y, '#ff3333', '⚔️ ALLAH');
                this.drawArmy(this.emirPos.x, this.emirPos.y, '#3366ff', '🛡️ EMİR');

                // Mermiler
                for (let i = this.projectiles.length - 1; i >= 0; i--) {
                    let proj = this.projectiles[i];
                    proj.progress += proj.speed;

                    if (proj.progress >= 1) {
                        this.addExplosion(proj.targetX, proj.targetY, proj.color);
                        this.projectiles.splice(i, 1);
                        continue;
                    }

                    const x = proj.x + (proj.targetX - proj.x) * proj.progress;
                    const y = proj.y + (proj.targetY - proj.y) * proj.progress;

                    // Füze çizimi
                    this.ctx.fillStyle = proj.color;
                    this.ctx.beginPath();
                    this.ctx.arc(x, y, 6, 0, Math.PI * 2);
                    this.ctx.fill();

                    // Iz
                    this.ctx.strokeStyle = proj.color;
                    this.ctx.globalAlpha = 0.5;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(x - 20, y);
                    this.ctx.lineTo(x, y);
                    this.ctx.stroke();
                    this.ctx.globalAlpha = 1;
                }

                // Patlamalar
                for (let i = this.explosions.length - 1; i >= 0; i--) {
                    let exp = this.explosions[i];
                    exp.life--;
                    exp.radius = exp.maxRadius * (1 - exp.life / 20);

                    this.ctx.strokeStyle = exp.color;
                    this.ctx.globalAlpha = exp.life / 20;
                    this.ctx.lineWidth = 3;
                    this.ctx.beginPath();
                    this.ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
                    this.ctx.stroke();

                    if (exp.life <= 0) {
                        this.explosions.splice(i, 1);
                    }
                }
                this.ctx.globalAlpha = 1;
                this.ctx.shadowBlur = 0;

                requestAnimationFrame(() => this.animate());
            }
        }

        // ========== ANA LOGIC ==========
        const map = new WarMap('warMap');
        let allahWins = 0;

        function updateNewsAndStats() {

            allahNews.forEach((news, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="news-time">⚔️ ${String(Math.floor(Math.random() * 24)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}</div>
                        <div class="news-title">${news.title}</div>
                        <div class="news-desc">${news.desc}</div>
                    `;
                    allahNewsEl.appendChild(div);
                }, i * 300);
            });

            // Emir haberleri
            const emirNewsEl = document.getElementById('emirNews');
            emirNewsEl.innerHTML = '';
            emirNews.forEach((news, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.style.borderLeftColor = '#3366ff';
                    div.style.background = 'rgba(51, 102, 255, 0.1)';
                    div.innerHTML = `
                        <div class="news-time">🛡️ ${String(Math.floor(Math.random() * 24)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}</div>
                        <div class="news-title">${news.title}</div>
                        <div class="news-desc">${news.desc}</div>
                    `;
                    emirNewsEl.appendChild(div);
                }, i * 300);
            });
        }

        // Saat Güncelleme
        function updateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('tr-TR');
        }

        // Alt Ticker
        function generateTicker() {
            const ticker = document.getElementById('tickerContent');
            const items = [
                "🔴 ALLAH ORDUSU DOĞUYA İLERLİYOR!",
                "⚡ TANRISAL GÜÇ %95'E ÇIKTI!",
                "💣 BOMBALAR YAĞIYOR!",
                "🚀 FÜZELERİ ATEŞLİ!",
                "🛡️ EMİR SAVUNMADA!",
                "🎯 BAŞKENT TARHDİ ALTINDA!",
                "⚔️ SavaŞ DER BAŞTADIR!",
                "🔥 CEPHEDE ÇATIŞMA!",
                "📍 NÖTR BÖLGE İŞGAL ALTINDA!",
                "💪 ALLAH KAZANACAK!"
            ];

            items.forEach((item, i) => {
                const itemEl = document.createElement('div');
                itemEl.className = 'ticker-item';
                itemEl.innerHTML = `<span class="ticker-emoji">${item.charAt(0)}</span> ${item}`;
                ticker.appendChild(itemEl);

                const itemEl2 = document.createElement('div');
                itemEl2.className = 'ticker-item';
                itemEl2.innerHTML = `<span class="ticker-emoji">${item.charAt(0)}</span> ${item}`;
                ticker.appendChild(itemEl2);
            });
        }

        // Savaş Senaryo Sistemi
        let turnCount = 0;
        function battleTurn() {
            turnCount++;

            // Rastgele saldırı
            if (Math.random() > 0.4) {
                const isAllahAttack = Math.random() > 0.5;
                if (isAllahAttack) {
                    map.fireProjectile(map.allahPos, map.emirPos, '#ff3333');
                    floatingText(`ALLAH SALDI!`, '#ffff00');
                } else {
                    map.fireProjectile(map.emirPos, map.allahPos, '#3366ff');
                    floatingText(`EMİR SALDI!`, '#ffff00');
                }
            }

            // Güç değişimi
            if (Math.random() > 0.6) {
                map.allahPower = Math.min(map.allahPower + 2, 100);
                updateStats();
            }

            if (Math.random() > 0.65) {
                map.emirPower = Math.max(map.emirPower - 3, 0);
                updateStats();
            }

            // Zafer koşulu
            if (map.emirPower <= 0) {
                allahWins++;
                showVictory('ALLAH KAZANDI! 🎊', '#ffff00');
                sound.playWin();
                setTimeout(() => resetBattle(), 3000);
            } else if (map.allahPower <= 0) {
                emirWins++;
                showVictory('EMİR KAZANDI! 🏆', '#00ccff');
                sound.playWin();
                setTimeout(() => resetBattle(), 3000);
            }
        }

        function resetBattle() {
            map.allahPower = 75;
            map.emirPower = 68;
            updateStats();
        }

        function updateStats() {
            // Stats update (if you have stat elements)
        }

        function floatingText(text, color) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.color = color;
            el.style.left = Math.random() * window.innerWidth + 'px';
            el.style.top = Math.random() * (window.innerHeight - 200) + 'px';
            document.body.appendChild(el);

            setTimeout(() => el.remove(), 3000);
        }

        function showVictory(text, color) {
            const el = document.createElement('div');
            el.className = 'big-text';
            el.textContent = text;
            el.style.color = color;
            el.style.textShadow = `0 0 40px ${color}`;
            document.body.appendChild(el);

            setTimeout(() => el.remove(), 3000);
        }

        // Sayfa Yükleme
        window.addEventListener('load', () => {
            updateTime();
            updateNewsAndStats();
            generateTicker();
            resetBattle();

            setInterval(updateTime, 1000);
            setInterval(battleTurn, 2000);
        });
    </script>
</body>
</html>
