<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WARZONE - Global News Network</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Üst Bar -->
    <div class="top-bar">
        <div class="time-display" id="timeDisplay">00:00:00</div>
        <div class="status-indicator">
            <span class="pulse"></span> LIVE FEED
        </div>
    </div>

    <!-- Ana Container -->
    <div class="main-container">
        <!-- Sol Panel - Haberler -->
        <div class="left-panel">
            <div class="panel-header">
                <h1>⚔️ BREAKING NEWS</h1>
                <div class="header-line"></div>
            </div>

            <div class="news-ticker" id="newsTicker">
                <!-- Haberler buraya gelecek -->
            </div>

            <div class="stats-container">
                <div class="stat-box">
                    <div class="stat-number" id="statDeaths">0</div>
                    <div class="stat-label">Savaş Zararları</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="statVictory">0</div>
                    <div class="stat-label">Zaferyetler</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="statTerritories">0</div>
                    <div class="stat-label">Toplamıyılan Alanlar</div>
                </div>
            </div>
        </div>

        <!-- Orta Panel - Harita -->
        <div class="center-panel">
            <canvas id="warMap" width="800" height="600"></canvas>
            <div class="map-legend">
                <div class="legend-item">
                    <span class="legend-color" style="background: #ff3333;"></span>
                    <span>Allah Orduları</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #3366ff;"></span>
                    <span>Emir İmparatorluğu</span>
                </div>
                <div class="legend-item">
                    <span class="legend-color" style="background: #ffaa00;"></span>
                    <span>Nötr Bölge</span>
                </div>
            </div>
        </div>

        <!-- Sağ Panel - Detaylar -->
        <div class="right-panel">
            <div class="panel-header">
                <h2>🎯 SAVAŞ İSTATİSTİKLERİ</h2>
                <div class="header-line"></div>
            </div>

            <div class="details-container">
                <div class="detail-item">
                    <span class="detail-label">Allah'ın Gücü:</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="allaahPower" style="width: 65%;"></div>
                    </div>
                    <span class="detail-value" id="allaahPowerText">65%</span>
                </div>

                <div class="detail-item">
                    <span class="detail-label">Emir'in Gücü:</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="emirPower" style="width: 85%; background: linear-gradient(90deg, #3366ff, #0099ff);"></div>
                    </div>
                    <span class="detail-value" id="emirPowerText">85%</span>
                </div>

                <div class="battle-log">
                    <h3>📜 SAVAŞ GÜNLÜĞü</h3>
                    <div id="battleLog" class="log-entries">
                        <!-- Log girdileri buraya gelecek -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Altında Kaydırılabilir Haber Şeridi -->
    <div class="bottom-ticker">
        <div class="ticker-content" id="tickerContent">
            <!-- Tekrarlayan haberler buraya gelecek -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
